data:
  metadata_keys: [ID]
  groups:
    - name: gi_organs
      mode: multiclass
      classes: [background, large_bowel, small_bowel, stomach]
  datasets:
    root_dir: /data/gi_tract
    train:
      data_dir: .
      meta_csv: metadata/train.csv

model:
  cls: segx.train.model.segnet.SegModel
  params:
    arch: Unet
    encoder_name: resnet34
    encoder_weights: imagenet
    in_channels: 1

train:
  seed: 42
  fold: 0
  num_epochs: 10
  lr: 1e-4

loss:
  cls: segx.train.loss.GroupedLoss
  params:
    groups: ${data.groups}
    group_losses:
      gi_organs:
        weight: 1.0
        components:
          - cls: segmentation_models_pytorch.losses.DiceLoss
            weight: 0.5
            params:
              mode: multiclass
          - cls: segmentation_models_pytorch.losses.SoftCrossEntropyLoss
            weight: 0.5
            params: {}
